<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>indicator playground</title>
    <link rel="stylesheet" href="indicator.css" />
    <style>
      html, body {
        margin: 0;
        min-height: 100vh;
        background: #0c0c0c;
        color: #eaeaea;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 32px 80px;
      }

      h1 {
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 24px;
      }

      .stage {
        display: flex;
        align-items: center;
        gap: 64px;
        padding: 48px;
        background: #000;
        border-radius: 16px;
        margin-bottom: 32px;
      }

      .stage .real {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        color: #666;
        font-size: 11px;
      }

      .stage .zoom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        color: #666;
        font-size: 11px;
      }

      /* Render the zoomed indicator as a fresh instance at 20x via transform.
         We scale the wrapper so layout takes the scaled-up space. */
      .zoom-wrap {
        width: 300px;
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .zoom-wrap .indicator {
        transform: scale(20);
        transform-origin: center;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 24px;
      }

      button {
        appearance: none;
        background: #1a1a1a;
        color: #eaeaea;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 10px 14px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease;
      }
      button:hover { background: #242424; }
      button.active { background: #2a1f1c; border-color: #ffaa9b; color: #ffaa9b; }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 16px;
      }

      .cell {
        background: #000;
        border-radius: 12px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .cell .label {
        font-size: 11px;
        color: #888;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .cell .indicator {
        transform: scale(6);
        transform-origin: center;
        margin: 24px 0;
      }

      footer {
        margin-top: 48px;
        font-size: 12px;
        color: #555;
        line-height: 1.6;
      }
      footer code {
        background: #1a1a1a;
        padding: 2px 6px;
        border-radius: 4px;
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>indicator playground</h1>

      <div class="stage">
        <div class="real">
          <div class="indicator" id="stageReal" data-pattern="idle">
            <div class="indicator-layer glow">
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
            </div>
            <div class="indicator-layer">
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
            </div>
          </div>
          <span>actual size (15×15)</span>
        </div>

        <div class="zoom">
          <div class="zoom-wrap">
            <div class="indicator" id="stageZoom" data-pattern="idle">
              <div class="indicator-layer glow">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
              </div>
              <div class="indicator-layer">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
              </div>
            </div>
          </div>
          <span>20× zoom</span>
        </div>
      </div>

      <div class="controls" id="controls"></div>

      <h1>all patterns</h1>
      <div class="grid" id="grid"></div>

      <footer>
        Each cell's opacity is a CSS variable <code>--o0</code>…<code>--o8</code>
        (left→right, top→bottom). Switch patterns by setting
        <code>data-pattern</code> on <code>.indicator</code>. Edit
        <code>indicator.css</code> to add new patterns or tune animation.
      </footer>
    </main>

    <script>
      const PATTERNS = ["idle", "thinking", "tool", "awaiting", "done", "off"];

      const indicatorMarkup = `
        <div class="indicator-layer glow">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="indicator-layer">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>`;

      // Build the controls bar.
      const controls = document.getElementById("controls");
      const stageReal = document.getElementById("stageReal");
      const stageZoom = document.getElementById("stageZoom");

      PATTERNS.forEach((p, i) => {
        const btn = document.createElement("button");
        btn.textContent = p;
        if (p === "idle") btn.classList.add("active");
        btn.addEventListener("click", () => {
          stageReal.dataset.pattern = p;
          stageZoom.dataset.pattern = p;
          document.querySelectorAll("#controls button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        });
        controls.appendChild(btn);
      });

      // Build the grid showing every pattern side by side.
      const grid = document.getElementById("grid");
      PATTERNS.forEach(p => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.innerHTML = `
          <div class="indicator" data-pattern="${p}">${indicatorMarkup}</div>
          <div class="label">${p}</div>`;
        grid.appendChild(cell);
      });
    </script>
  </body>
</html>
